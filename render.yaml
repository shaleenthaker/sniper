services:
  - type: web
    name: sniper-backend
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 24.15.0
      - key: DATA_SOURCE
        value: supabase
      - key: CORS_ORIGIN
        value: "*"
      - key: ADMIN_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: SCRAPER_USER_AGENT
        sync: false
      - key: DEVPOST_SCRAPE_DELAY_MS
        value: "650"
      - key: DEVPOST_HACKATHON_DELAY_MS
        value: "2500"
      - key: DEVPOST_SKIP_RECENT_HOURS
        value: "24"

  - type: worker
    name: sniper-devpost-worker
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run scrape:devpost:watch -- --max-list-pages 3 --max-hackathons 10 --max-project-pages 1 --max-projects-per-hackathon 24
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 24.15.0
      - key: DATA_SOURCE
        value: supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SCRAPER_USER_AGENT
        sync: false
      - key: DEVPOST_SCRAPE_DELAY_MS
        value: "650"
      - key: DEVPOST_HACKATHON_DELAY_MS
        value: "2500"
      - key: DEVPOST_WATCH_INTERVAL_MS
        value: "900000"
      - key: DEVPOST_SKIP_RECENT_HOURS
        value: "24"
