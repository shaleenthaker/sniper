name: Devpost scrape

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      max_list_pages:
        description: "Devpost listing pages to scan"
        default: "3"
        required: true
      max_hackathons:
        description: "Prioritized hackathons to scrape"
        default: "8"
        required: true
      max_projects_per_hackathon:
        description: "Projects per hackathon"
        default: "12"
        required: true

concurrency:
  group: devpost-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: backend
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SCRAPER_USER_AGENT: ${{ secrets.SCRAPER_USER_AGENT }}
      DEVPOST_SCRAPE_DELAY_MS: "650"
      DEVPOST_HACKATHON_DELAY_MS: "2500"
      DEVPOST_SKIP_RECENT_HOURS: "24"
      DEVPOST_PRIORITY_KEYWORDS: ${{ vars.DEVPOST_PRIORITY_KEYWORDS }}
      DEVPOST_PRIORITY_ORGANIZERS: ${{ vars.DEVPOST_PRIORITY_ORGANIZERS }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npm run build

      - name: Scrape prioritized Devpost hackathons
        run: >
          npm run scrape:devpost:watch -- --once
          --max-list-pages "${{ inputs.max_list_pages || '3' }}"
          --max-hackathons "${{ inputs.max_hackathons || '8' }}"
          --max-project-pages 1
          --max-projects-per-hackathon "${{ inputs.max_projects_per_hackathon || '12' }}"
